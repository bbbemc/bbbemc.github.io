<html lang="en">

<head>
    <meta charset="UTF-8" />

    <title>B-do-i</title>
    <style>
        * {
            box-sizing: border-box;
            transition: 0.4s ease;
        }

        body,
        html {
            background-image: url('photo/batthern.png');
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: auto;
            font-family: sans-serif;

        }

        header {
            padding-top: 30px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 999;
            padding-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        nav {
            padding: 10px 0;
        }

        .navbar {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 0;
            margin: 0;
        }

        .navbar li a {
            text-decoration: none;
            color: #622fc0;
            font-weight: bold;
            font-size: 1.3rem;
        }

        .display {
            width: 100%;
            min-height: 100vh;
            padding-top: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.4s ease;
            position: relative;

        }

        .sun-mode {
            background: #ffffff;
        }

        .moon-mode {
            background: #2C2C2F;
        }

        .blue-mode {
            background: #07071d;
        }

        .slider-container {
            position: relative;
            width: 80%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 100px;
        }

        .slider {
            display: flex;
            transition: transform 0.5s ease;
            will-change: transform;
            width: max-content;
            min-width: 100%;
        }

        .card {
            width: 200px;
            height: 300px;
            margin: 0 10px;
            background-color: transparent;
            cursor: pointer;
            transform-style: preserve-3d;
            perspective: 1000px;
            transition: transform 0.4s;
            position: relative;
            flex-shrink: 0;
        }

        .card img {
            width: 100%;
            height: 100%;
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            user-select: none;
            pointer-events: auto;
        }

        .card:hover {
            transform: scale(1.1) rotateY(10deg);
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.3), transparent);
            transform: rotateX(180deg);
            opacity: 0.5;
            pointer-events: none;
        }

        .arrow {
            font-size: 3rem;
            cursor: pointer;
            color: white;
            padding: 0.5rem;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            opacity: 0.8;
        }

        .arrow.left {
            left: 10px;
        }

        .arrow.right {
            right: 10px;
        }

        .toggle {
            width: 60px;
            height: 30px;
            background: #f3f3f3;
            border-radius: 999px;
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            box-shadow: inset 4px 4px 10px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.1), -2px -2px 6px rgba(255, 255, 255, 0.7) inset;
            transition: left 0.4s ease, background 0.4s ease;
        }

        .circle svg {
            position: absolute;
            width: 16px;
            height: 16px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .sun {
            color: #FFD600;
        }

        .moon {
            color: white;
        }

        .blue {
            color: #07071d;
        }

        .sun-mode .circle {
            left: 3px;
            background: white;
        }

        .sun-mode .sun {
            opacity: 1;
        }

        .moon-mode .circle {
            left: 18px;
            background: #2C2C2F;
        }

        .moon-mode .moon {
            opacity: 1;
        }

        .blue-mode .circle {
            left: 33px;
            background: #3a3aca;
        }

        .blue-mode .blue {
            opacity: 1;
        }

        body.sun-mode header {
            background-color: #ffffff;
            color: #000000;
        }

        body.moon-mode header {
            background-color: #2C2C2F;
            color: #ffffff;
        }

        body.blue-mode header {
            background-color: #07071d;
            color: #ffffff;
        }

        .chill-bro {
            width: 200px;
            height: auto;
            position: absolute;
            top: 50%;
            left: 250px;
            transform: translate(440%, 70%);
        }
    </style>
</head>

    <script>
        // Toggle mode
        let mode = 2;
        function nextMode() {
            const body = document.body;
            body.classList.remove('sun-mode', 'moon-mode', 'blue-mode');
            mode = (mode + 1) % 3;
            if (mode === 0) body.classList.add('sun-mode');
            else if (mode === 1) body.classList.add('moon-mode');
            else body.classList.add('blue-mode');
        }

        let currentIndex = 0;

        function getCardWidth() {
            const card = document.querySelector('.card');
            if (!card) return 0;
            const cardStyle = getComputedStyle(card);
            return card.offsetWidth + parseInt(cardStyle.marginLeft) + parseInt(cardStyle.marginRight);
        }

        function getVisibleCards() {
            const container = document.querySelector('.slider-container');
            return Math.floor(container.offsetWidth / getCardWidth());
        }

        function updateSlider() {
            const slider = document.getElementById('slider');
            const cards = slider.querySelectorAll('.card');
            const maxIndex = Math.max(0, cards.length - getVisibleCards());

            currentIndex = Math.max(0, Math.min(currentIndex, maxIndex));

            const offset = currentIndex * getCardWidth();
            slider.style.transform = `translateX(${-offset}px)`;
        }

        function slide(direction) {
            const slider = document.getElementById('slider');
            const cards = slider.querySelectorAll('.card');
            const maxIndex = Math.max(0, cards.length - getVisibleCards());

            currentIndex += direction;
            currentIndex = Math.max(0, Math.min(currentIndex, maxIndex));

            updateSlider();
        }

        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', () => {
                const type = card.getAttribute('data-type');
                window.location.href = `JK.html?type=${type}`;
            });
        });

        window.addEventListener('resize', updateSlider);
        window.addEventListener('DOMContentLoaded', () => {
            updateSlider();
        });
    </script>
